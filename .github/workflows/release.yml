name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # needed by softprops/action-gh-release to create + upload assets

jobs:
  build:
    strategy:
      fail-fast: false  # one platform's transient upload failure must NOT cancel the others (S481)
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: windows-x86_64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,    platform: darwin-x86_64 }
          - { os: macos-14,       target: aarch64-apple-darwin,   platform: darwin-aarch64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, platform: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsecret-1-dev
      - run: npm ci
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload to GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
      - name: Upload to Nexus (stage)
        continue-on-error: true
        env:
          NEXUS_CI_TOKEN: ${{ secrets.NEXUS_CI_TOKEN }}
        run: ./scripts/upload-to-nexus.sh ${{ matrix.platform }} ${{ github.ref_name }}
      - name: Cache rsign2 (minisign verifier)
        # Restores the from-source rsign build across releases so the HARD GATE
        # below doesn't rebuild it (or hit a crates.io hiccup) on every run.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/rsign
            ~/.cargo/bin/rsign.exe
          key: rsign2-${{ runner.os }}-v1
      - name: Verify Nexus publish (HARD GATE)
        env:
          NEXUS_CI_TOKEN: ${{ secrets.NEXUS_CI_TOKEN }}
        run: ./scripts/verify-nexus-release.sh ${{ matrix.platform }} ${{ github.ref_name }}
