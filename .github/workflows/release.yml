name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write  # needed by softprops/action-gh-release to create + upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: windows-latest, target: x86_64-pc-windows-msvc, platform: windows-x86_64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,    platform: macos-x86_64 }
          - { os: macos-14,       target: aarch64-apple-darwin,   platform: macos-aarch64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, platform: linux-x86_64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: '${{ matrix.target }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsecret-1-dev
      - run: npm ci
      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}
      - name: Upload to GH Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.sig
      - name: Upload to Nexus
        env:
          NEXUS_CI_TOKEN: ${{ secrets.NEXUS_CI_TOKEN }}
        run: ./scripts/upload-to-nexus.sh ${{ matrix.platform }} ${{ github.ref_name }}
