<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vault Sync — Pairing</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>Vault Sync Setup</h1>
      <p class="subtitle">Connect this device to your Nexus instance.</p>

      <form id="pairing-form">
        <div class="field">
          <label for="nexus-url">Nexus URL</label>
          <input
            id="nexus-url"
            type="url"
            placeholder="https://nexus.example.com"
            required
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="token">Bearer Token</label>
          <input
            id="token"
            type="password"
            placeholder="vsk_…"
            required
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="field">
          <label for="vault-root">Vault Root Path</label>
          <div class="row-input">
            <input
              id="vault-root"
              type="text"
              placeholder="/path/to/your/vault"
              required
              autocomplete="off"
              spellcheck="false"
            />
            <button type="button" id="browse-btn">Browse…</button>
          </div>
        </div>

        <button type="submit" id="pair-btn">Pair</button>
      </form>

      <div id="status" class="status hidden"></div>

      <div id="success-panel" class="hidden">
        <h2>Paired!</h2>
        <p>Subscriber: <strong id="result-subscriber-id"></strong></p>
        <p>Mode: <strong id="result-mode"></strong></p>
        <p>Scope roots: <span id="result-scope-roots"></span></p>
        <p class="note">You can close this window — the daemon is running in the system tray.</p>
      </div>
    </main>
  </body>
</html>
