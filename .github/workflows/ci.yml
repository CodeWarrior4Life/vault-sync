name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: 'clippy,rustfmt' }
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsecret-1-dev gnome-keyring
      - name: Start gnome-keyring (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          eval $(dbus-launch --sh-syntax)
          mkdir -p ~/.cache ~/.local/share/keyrings
          (echo -n "" | gnome-keyring-daemon --unlock --components=secrets)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri
      - run: cargo test --all-targets
        working-directory: src-tauri
